name: Queueless Master Quality Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-integrity-check:
    name: Backend Integrity & Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      - name: Resolve Backend Dependencies
        working-directory: ./backend
        run: npm install
      - name: Execute Core Logic Unit Tests (Jest)
        working-directory: ./backend
        run: npm test

  frontend-quality-verification:
    name: Frontend Quality & UI/UX Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Resolve Frontend Packages
        working-directory: ./queueless
        run: flutter pub get
      - name: Static Analysis & Linting (Flutter Analyzer)
        working-directory: ./queueless
        run: flutter analyze --no-fatal-infos || true
      - name: Execute Widget & Model Tests
        working-directory: ./queueless
        run: flutter test
