name: Queueless CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-ci:
    name: Backend CI & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install --ignore-scripts

      - name: Run Tests & Collect Coverage
        working-directory: ./backend
        run: npx jest --coverage --testPathPattern=tests/ --forceExit

      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: backend/coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 80'

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Frontend Dependencies
        working-directory: ./queueless
        run: flutter pub get

      - name: Analyze Code (Lint Gates)
        working-directory: ./queueless
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run Flutter Unit Tests
        working-directory: ./queueless
        run: flutter test test/models_test.dart test/widget_test.dart --coverage
